# application.yml - Correct Jackson Configuration
spring:
  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/book_db?useSSL=false&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update  # create, create-drop, validate, none
    show-sql: true  # Log SQL statements
    properties:
      hibernate:
        format_sql: true  # Pretty-print SQL
        dialect: org.hibernate.dialect.MySQL8Dialect

  # Jackson Configuration (Corrected)
  jackson:
    # This is the correct way - just set it to true/false
    serialization:
      write-dates-as-timestamps: false  # Just a boolean value, not an enum reference

    # Alternative: Use date format instead
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

    # Property inclusion (what to include in JSON)
    default-property-inclusion: non_null  # Don't include null properties
    # Deserialization settings
    deserialization:
      fail-on-unknown-properties: false  # Don't fail on unknown properties
    # Mapper features
    mapper:
      accept-case-insensitive-properties: true  # Accept case insensitive property names

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api

# Logging Configuration
logging:
  level:
    com.example.bookmanagement: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Custom Application Properties
app:
  name: Book Management System
  version: 1.0.0
  default-page-size: 20
  max-page-size: 100