spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect   # Fixed dialect
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss                  # Custom date format
    time-zone: UTC                                     # Timezone

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  file:
    name: /app/logs/application.log
  level:
    com.example.bookMgment: INFO