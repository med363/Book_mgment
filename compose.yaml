version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: book_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: book_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: bookuser
      MYSQL_PASSWORD: bookpassword
      TZ: UTC
    ports:
      - "3307:3306"  # Note: using 3307 on host
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - book-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  book-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Use host.docker.internal for Mac/Windows, or 172.17.0.1 for Linux
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3307/book_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: bookuser
      SPRING_DATASOURCE_PASSWORD: bookpassword
    ports:
      - "8080:8080"
    networks:
      - book-network
    volumes:
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"  # For Linux compatibility
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: book_phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: bookuser
      PMA_PASSWORD: bookpassword
      UPLOAD_LIMIT: 100M
    ports:
      - "8081:80"
    networks:
      - book-network

networks:
  book-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local